<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이화의료원 개인정보보호교육(전산정보팀)</title>
    <style>
        :root { --primary: #006633; --info: #1e40af; --gray: #9ca3af; --correct: #059669; --wrong: #dc2626; }
        body { font-family: 'Pretendard', sans-serif; background: #f3f4f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .notice-box { background: #eff6ff; border-left: 5px solid var(--info); padding: 15px; margin: 20px 0; color: #1e3a8a; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; }
        
        /* 퀴즈 스타일 */
        .quiz-option { display: flex; align-items: center; background: #f9fafb; padding: 12px; margin: 8px 0; border: 1px solid #e5e7eb; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .quiz-option:hover { background: #eff6ff; border-color: var(--primary); }
        .opt-num { background: #e5e7eb; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; border-radius: 50%; margin-right: 12px; font-size: 13px; font-weight: bold; flex-shrink: 0; }
        
        .back-btn { background: var(--gray); margin-top: 20px; font-size: 14px; }
        #certificate { border: 10px double var(--primary); padding: 30px; text-align: center; margin-top: 20px; background: #fff; }
        .cert-title { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #333; }

        /* 해설 페이지 스타일 */
        .review-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .review-q { font-weight: bold; margin-bottom: 8px; color: #333; }
        .review-ans { font-size: 14px; margin: 4px 0; }
        .txt-correct { color: var(--correct); font-weight: bold; }
        .txt-wrong { color: var(--wrong); font-weight: bold; }
        .explanation { background: #f0fdf4; padding: 12px; border-radius: 6px; font-size: 13px; color: #166534; margin-top: 8px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2 style="color: var(--primary);">이화의료원 개인정보보호교육 퀴즈</h2>
        <div class="notice-box">
            📢 안내: 총 10문제 중 7문제 이상 맞춰야 수료 가능합니다.<br>
            <span style="color: #dc2626;">※ 응시 결과는 자동으로 저장됩니다.</span>
        </div>
        <p>응시를 위해 정보를 입력해주세요.</p>
        <input type="text" id="user-name" placeholder="이름 입력">
        <input type="text" id="user-id" placeholder="사번 입력">
        <button onclick="startQuiz()">시작하기</button>
    </div>

    <div id="quiz-section" class="hidden">
        <h2 id="question-title" style="word-break: keep-all; line-height: 1.4; min-height: 3em;"></h2>
        <div id="options-container"></div>
        <div id="navigation-container"></div>
        <p style="text-align: right; color: #666; margin-top: 20px;">문제 <span id="current-idx">1</span> / 10</p>
    </div>

    <div id="result-section" class="hidden">
        <h2>퀴즈 결과</h2>
        <p id="score-text" style="font-size: 18px; font-weight: bold;"></p>
        
        <div id="pass-extras" class="hidden">
            <button onclick="showReview()" style="background: var(--info); margin-bottom: 10px;">✅ 정답 및 해설 확인하기</button>
            <div id="certificate">
                <div class="cert-title">수 료 증</div>
                <p style="font-size: 18px;">성명: <span id="cert-name"></span></p>
                <p style="font-size: 18px;">사번: <span id="cert-id"></span></p>
                <p style="margin-top: 30px; line-height: 1.8;">위 사람은 <strong>개인정보보호교육 과정</strong>을<br>성실히 이수하였음을 증명합니다.</p>
                <p style="margin-top: 20px; font-weight: bold;" id="cert-date"></p>
            </div>
        </div>

        <button onclick="location.reload()" style="background:#6b7280; margin-top: 20px;">다시하기</button>
    </div>

    <div id="review-section" class="hidden">
        <h2 style="color: var(--info);">정답 및 해설</h2>
        <div id="review-container"></div>
        <button onclick="closeReview()" style="margin-top: 20px; background: var(--gray);">결과 화면으로 돌아가기</button>
    </div>
</div>

<script>
    const DEPT_NAME = "전산정보팀"; 

    // 문제 데이터 (해설 추가)
    const questions = [
        { q: "개인정보 보호법상 '가명정보'에 대한 설명으로 옳은 것은?", a: ["추가 정보의 사용 없이는 특정 개인을 알아볼 수 없는 정보이다.", "통계 작성을 위해서라도 동의 없이는 사용할 수 없다.", "가명처리된 정보는 더 이상 개인정보 보호법의 적용을 받지 않는다.", "가명정보 복원을 위한 추가 정보는 데이터와 함께 보관해야 한다."], cor: 0, exp: "가명정보는 추가 정보 없이는 식별이 불가능한 정보로, 통계/연구 목적 시 동의 없이 활용 가능합니다." },
        { q: "개인정보 처리 시스템 접근 권한 관리 원칙으로 가장 적절한 것은?", a: ["모든 개발자에게 동일한 권한을 부여한다.", "업무 역할에 따라 최소 권한만 부여한다.", "프로젝트 단위로 공유 계정을 사용한다.", "개발 편의를 위해 관리자 권한을 기본 부여한다."], cor: 1, exp: "권한 남용 방지를 위해 직무에 필요한 '최소 권한' 부여가 기본 원칙입니다." },
        { q: "개발자가 비밀번호를 저장할 때 가장 안전한 방식은 무엇인가?", a: ["평문으로 저장한다.", "Base64 인코딩하여 저장한다.", "Salt를 적용한 단방향 해시로 저장한다.", "압축 후 저장한다."], cor: 2, exp: "단방향 해시에 솔트(Salt)를 추가하여 레인보우 테이블 공격 등을 방지해야 합니다." },
        { q: "개인정보 전송 시 적용해야 하는 가장 적절한 보안 기술은 무엇인가?", a: ["HTTP 통신", "FTP 전송", "TLS 기반 암호화 통신", "파일 압축 전송"], cor: 2, exp: "데이터 전송 구간 암호화를 위해 TLS(HTTPS) 적용이 필수적입니다." },
        { q: "다음 중 SQL Injection 공격의 주요 위험으로 가장 적절한 것은?", a: ["서버 속도 저하", "대량의 개인정보 데이터베이스 유출", "로그 저장 실패", "웹사이트 디자인 변경"], cor: 1, exp: "SQL Injection은 DB 쿼리를 조작하여 비정상적으로 데이터를 유출시키는 공격입니다." },
        { q: "세션 관리 보안 강화를 위한 방법으로 적절하지 않은 것은?", a: ["세션 타임아웃 설정", "HTTPS 기반 세션 전달", "세션 ID 재사용", "로그인 시 세션 ID 재발급"], cor: 2, exp: "세션 하이재킹 방지를 위해 세션 ID는 재사용하지 않고 로그인마다 새로 발급해야 합니다." },
        { q: "관리자 계정 보안을 강화하기 위한 가장 효과적인 방법은 무엇인가?", a: ["관리자 계정 공유", "자동 로그인 설정", "다중요소 인증(MFA) 적용", "비밀번호 단순화"], cor: 2, exp: "관리자 페이지는 비밀번호 외에 추가 인증(MFA)을 적용하는 것이 안전성 확보의 핵심입니다." },
        { q: "개인정보가 저장된 데이터베이스의 보안을 강화하는 방법으로 가장 적절한 것은?", a: ["DB 접근 IP 제한", "모든 개발자에게 DB 접근 허용", "관리자 계정 공유", "DB 로그 비활성화"], cor: 0, exp: "인가된 특정 IP나 서버에서만 DB에 접근할 수 있도록 화이트리스트 관리가 필요합니다." },
        { q: "다음 중 반드시 암호화 저장이 필요한 정보는 무엇인가?", a: ["가명화된 성명", "게시글 제목", "신용카드번호", "회사 주소"], cor: 2, exp: "고유식별정보와 결제정보(카드번호 등)는 법적/보안상 반드시 암호화하여 저장해야 합니다." },
        { q: "개인정보 처리 로그를 보관하는 가장 중요한 목적은 무엇인가?", a: ["서버 성능 분석", "사용자 편의성 향상", "사고 발생 시 추적 및 감사", "데이터 압축"], cor: 2, exp: "로그는 향후 보안 사고 발생 시 원인을 파악하고 대응하기 위한 사후 증적 자료입니다." }
    ];

    let currentIdx = 0, score = 0, userData = { name: '', id: '' };
    let scoreHistory = [];
    let userAnswers = []; // 사용자 선택 답 저장용

    function startQuiz() {
        userData.name = document.getElementById('user-name').value;
        userData.id = document.getElementById('user-id').value;
        if(!userData.name || !userData.id) return alert("이름과 사번을 입력하세요.");
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('quiz-section').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if(currentIdx >= questions.length) return finishQuiz();
        const qData = questions[currentIdx];
        document.getElementById('question-title').innerText = `Q${currentIdx + 1}. ${qData.q}`;
        document.getElementById('current-idx').innerText = currentIdx + 1;
        const container = document.getElementById('options-container');
        const navContainer = document.getElementById('navigation-container');
        container.innerHTML = '';
        navContainer.innerHTML = '';
        
        qData.a.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'quiz-option';
            btn.innerHTML = `<span class="opt-num">${i + 1}</span> <span>${opt}</span>`;
            btn.onclick = () => {
                userAnswers[currentIdx] = i; // 답 기록
                const isCorrect = (i === qData.cor);
                scoreHistory[currentIdx] = isCorrect;
                if(isCorrect) score++;
                currentIdx++;
                showQuestion();
            };
            container.appendChild(btn);
        });

        if (currentIdx > 0) {
            const backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.innerText = "⬅ 이전 문제로 돌아가기";
            backBtn.onclick = () => {
                currentIdx--;
                if(scoreHistory[currentIdx] === true) score--;
                showQuestion();
            };
            navContainer.appendChild(backBtn);
        }
    }

    function finishQuiz() {
        document.getElementById('quiz-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        const isPassed = score >= 7;
        
        document.getElementById('score-text').innerText = isPassed 
            ? `축하합니다! ${score}점으로 합격하셨습니다.` 
            : `아쉽지만 ${score}점으로 불합격입니다. (7점 이상 합격)`;

        if(isPassed) {
            document.getElementById('pass-extras').classList.remove('hidden');
            document.getElementById('cert-name').innerText = userData.name;
            document.getElementById('cert-id').innerText = userData.id;
            document.getElementById('cert-date').innerText = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        // GAS 전송 로직 (생략 - 기존 URL 유지)
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw3kX_UWTFtQIFyAJ6waZsO2C1OtK5TlMPuWw8i5ryGwBvTlsT6Hdh9nRxD5clLRfO9/exec";
        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({
                "일시": new Date().toLocaleString(),
                "부서": DEPT_NAME,
                "이름": userData.name,
                "사번": userData.id,
                "점수": score,
                "결과": isPassed ? "수료" : "미수료"
            })
        }).catch(e => console.error(e));
    }

    function showReview() {
        document.getElementById('result-section').classList.add('hidden');
        document.getElementById('review-section').classList.remove('hidden');
        const container = document.getElementById('review-container');
        container.innerHTML = '';

        questions.forEach((q, i) => {
            const isCorrect = (userAnswers[i] === q.cor);
            const div = document.createElement('div');
            div.className = 'review-item';
            div.innerHTML = `
                <div class="review-q">Q${i+1}. ${q.q}</div>
                <div class="review-ans">내가 고른 답: <span class="${isCorrect?'txt-correct':'txt-wrong'}">${q.a[userAnswers[i]]}</span></div>
                <div class="review-ans">정답: <span class="txt-correct">${q.a[q.cor]}</span></div>
                <div class="explanation">💡 <b>해설:</b> ${q.exp}</div>
            `;
            container.appendChild(div);
        });
    }

    function closeReview() {
        document.getElementById('review-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
    }
</script>
</body>
</html>
